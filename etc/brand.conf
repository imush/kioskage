# kioskage brand.conf — appliance branding and defaults.
#
# This is the NEUTRAL default shipped with kioskage. To brand a fleet, ship
# your own brand.conf (and logo) on top of these files — e.g. from a small
# private overlay repo whose contents are copied over the defaults at install
# time. Nothing in the kioskage code hard-codes a product, URL, or password;
# it all comes from here.
#
# Sourced as sh KEY="value" lines (no spaces around =). Keep values quoted.

# ── Portal / landing identity ──────────────────────────────────────────────
BRAND_NAME="Kioskage"          # shown in the setup portal + on-screen landing
ACCENT_COLOR="#3a6ea5"          # portal accent colour
LOGO="logo.png"                 # logo file in the portal static dir

# ── Content ────────────────────────────────────────────────────────────────
# What the kiosk shows until it is configured. The portal's "kiosk key" field
# builds CONTENT_URL_BASE + "?key=<key>" (handy when many kiosks share one
# content site). Leave CONTENT_URL_BASE empty to hide the key field entirely
# and let operators paste a full URL instead.
DEFAULT_URL="about:blank"
CONTENT_URL_BASE=""             # e.g. https://example.com/kiosk  ->  ?key=<key>

# ── Keep-alive (fleet check-in) ────────────────────────────────────────────
# The kiosk can tag its content URL with &host=<name>&v=<version> so a content
# server can log which sticks are alive (see tools/kiosk-status.sh). To avoid
# leaking the hostname to arbitrary sites, tagging happens ONLY when the content
# URL is on this domain. Empty = never tag (keep-alive off).
KEEPALIVE_DOMAIN=""             # e.g. example.com

# ── Device identity + setup hotspot ────────────────────────────────────────
# Hostnames are "<HOSTNAME_PREFIX>-<last6-of-mac>". During on-screen setup an
# unconfigured stick joins any Wi-Fi hotspot whose PASSWORD is SETUP_PSK (the
# SSID need not match — iPhone hotspots can't be renamed); SETUP_SSID is only a
# fast-path hint. SETUP_PSK must be >= 8 chars (Wi-Fi/WPA minimum).
HOSTNAME_PREFIX="kiosk"
SETUP_SSID="kiosk"
SETUP_PSK="kiosksetup"
