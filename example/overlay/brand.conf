# Sample STICK config for the kioskage example content.
#
# This is the other half of the demo. example/index.html is what a stick
# *shows*; this file is what points a stick *at* it. Install it on a stick as
# /usr/local/etc/kioskage-brand.conf (or ship it as a brand overlay), with the
# URL changed to wherever you host this example/ directory.
#
# See ../etc/brand.conf for every key and what it does.

BRAND_NAME="Kioskage Demo"
ACCENT_COLOR="#3a6ea5"

# Where the stick points. The kiosk key becomes the ?key= country profile,
# e.g. key "uk" -> https://your-host.example/example/?key=uk
DEFAULT_URL="https://your-host.example/example/"
CONTENT_URL_BASE="https://your-host.example/example/"

# No fleet keep-alive for a local demo (would be your content domain).
KEEPALIVE_DOMAIN=""

# Device identity + setup hotspot (neutral defaults).
HOSTNAME_PREFIX="kiosk"
SETUP_SSID="kiosk"
SETUP_PSK="kiosksetup"
